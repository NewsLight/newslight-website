<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewsLight</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />

    <meta property="og:site_name" content="NewsLight" />
    <meta property="og:image" content="https://www.newslight.com/newslight-splash-blue.png" />
    <meta property="og:type" content="article" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['Playfair Display', 'Georgia', 'serif'],
              sans: ['Inter', 'system-ui', 'sans-serif'],
              brand: ['Montserrat', 'system-ui', 'sans-serif'],
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen font-sans antialiased text-white bg-gradient-to-b from-[#0a1628] via-[#0f4a6b] to-[#2ec8e8]">

    <!-- Nav (sticky) -->
    <header class="sticky top-0 z-50 border-b border-white/10 bg-[#0a1628]/85 backdrop-blur-md shadow-sm">
      <nav class="mx-auto flex w-full max-w-[1800px] items-center justify-between gap-2 px-4 py-4 sm:gap-4 sm:px-6 sm:py-5 md:px-10 lg:px-14 xl:px-20">
        <a href="/" class="flex min-w-0 items-center gap-2 sm:gap-3 hover:opacity-90 transition-opacity">
          <div class="flex h-16 w-16 shrink-0 items-center justify-center p-2 sm:h-20 sm:w-20 sm:p-3">
            <img src="/newslight-logo.jpeg" alt="" class="max-h-full max-w-full object-contain rounded-none" />
          </div>
          <span class="font-brand truncate text-lg tracking-tight sm:text-xl md:text-2xl"><span class="font-bold">News</span><span class="font-light">Light</span></span>
        </a>
        <div class="flex shrink-0 flex-wrap items-center justify-end gap-x-3 gap-y-1 sm:gap-x-5 md:gap-x-6">
          <a href="/#top" class="text-sm font-medium text-white/75 hover:text-white transition-colors">About</a>
          <a href="/#download" class="text-sm font-medium text-white/75 hover:text-white transition-colors">Download</a>
          <a href="/#contact" class="text-sm font-medium text-white/75 hover:text-white transition-colors">Contact</a>
        </div>
      </nav>
    </header>

    <!-- Content rendered by JS -->
    <main id="content" class="max-w-2xl mx-auto px-4 sm:px-6 md:px-10 lg:px-14 xl:px-20 py-16"></main>

    <!-- Footer -->
    <footer class="max-w-5xl mx-auto px-4 sm:px-6 md:px-10 lg:px-14 xl:px-20 py-12 border-t border-white/15">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
        <p class="text-white/55 text-sm">&copy; 2026 NewsLight. All rights reserved.</p>
        <div class="flex gap-6">
          <a href="/terms" class="text-white/55 text-sm hover:text-white transition-colors">Terms</a>
          <a href="/privacy" class="text-white/55 text-sm hover:text-white transition-colors">Privacy</a>
          <a href="/#contact" class="text-white/55 text-sm hover:text-white transition-colors">Contact</a>
        </div>
      </div>
    </footer>

    <script>
      (function () {
        var UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
        var path = window.location.pathname.replace(/\/+$/, '');
        var parts = path.split('/');
        // Match /article/{uuid}
        if (parts.length === 3 && parts[1] === 'article' && UUID_RE.test(parts[2])) {
          showArticlePage(parts[2]);
        } else {
          showNotFound();
        }

        function showNotFound() {
          document.title = 'Page Not Found — NewsLight';
          document.getElementById('content').innerHTML =
            '<div class="text-center py-20">' +
              '<h1 class="font-serif text-5xl font-bold mb-4">Page Not Found</h1>' +
              '<p class="text-white/80 text-lg mb-8">The page you\'re looking for doesn\'t exist.</p>' +
              '<a href="/" class="inline-block bg-white text-neutral-950 font-semibold text-sm px-8 py-4 rounded-full hover:bg-neutral-200 transition-colors">Back to Home</a>' +
            '</div>';
        }

        function showArticlePage(uuid) {
          var deepLink = 'newslight://app/news/' + uuid;
          var apiUrl = 'https://skykbtnscepbkerzcqlq.supabase.co/functions/v1/news/articles/' + uuid + '/preview';
          var apiKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNreWtidG5zY2VwYmtlcnpjcWxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY3OTE3ODYsImV4cCI6MjA4MjM2Nzc4Nn0.I9Uk1M_Hc3V5LPsbYmZMqDjkl1qfDvR7pqXcMtZqmpo';

          // Show loading state
          document.getElementById('content').innerHTML =
            '<div class="text-center py-20">' +
              '<div class="inline-block w-8 h-8 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>' +
              '<p class="text-white/80 mt-4">Loading article…</p>' +
            '</div>';

          // Deep link is triggered by the "Open in NewsLight" button, not auto-redirect

          // Fetch article preview
          fetch(apiUrl, {
            headers: { 'apikey': apiKey }
          })
            .then(function (res) {
              if (!res.ok) throw new Error('Not found');
              return res.json();
            })
            .then(function (json) {
              var article = (json.data && json.data.article) || json;
              var cityObj = (json.data && json.data.city) || {};
              var headline = article.headline || article.title || 'Untitled Article';
              var summary = article.summary || article.description || '';
              var city = cityObj.name || article.city_name || '';

              document.title = headline + ' — NewsLight';

              // Update OG tags dynamically (helps with some crawlers)
              setMeta('og:title', headline + ' — NewsLight');
              if (summary) setMeta('og:description', summary);
              setMeta('og:url', window.location.href);

              document.getElementById('content').innerHTML =
                '<article class="py-8">' +
                  (city ? '<p class="text-sm font-medium text-white/55 uppercase tracking-wider mb-4">' + escapeHtml(city) + '</p>' : '') +
                  '<h1 class="font-serif text-2xl md:text-3xl font-bold leading-tight mb-10 line-clamp-2">' + escapeHtml(headline.length > 60 ? headline.substring(0, 60) + '…' : headline) + '</h1>' +
                  '<div class="bg-black/20 backdrop-blur-sm border border-white/20 rounded-2xl p-8 text-center mb-12">' +
                    '<p class="text-white/80 mb-6">This article is available exclusively in the NewsLight app</p>' +
                    '<a href="' + deepLink + '" class="inline-block bg-white text-neutral-950 font-semibold px-8 py-4 rounded-full hover:bg-neutral-200 transition-colors mb-3">Open in NewsLight</a>' +
                  '</div>' +
                  '<div class="text-center">' +
                    '<h2 class="font-serif text-2xl font-bold mb-3">Coming Soon</h2>' +
                    '<p class="text-white/80 mb-6">NewsLight is launching soon. Stay tuned.</p>' +
                    '<span class="inline-block bg-black/25 border border-white/25 text-white font-semibold text-sm px-8 py-4 rounded-full">Coming to the App Store</span>' +
                  '</div>' +
                '</article>';
            })
            .catch(function () {
              document.title = 'Article — NewsLight';
              document.getElementById('content').innerHTML =
                '<div class="py-8 text-center">' +
                  '<h1 class="font-serif text-3xl md:text-4xl font-bold mb-4">Read This Article in NewsLight</h1>' +
                  '<p class="text-white/80 text-lg mb-8">This article is available exclusively in the NewsLight app.</p>' +
                  '<div class="bg-black/20 backdrop-blur-sm border border-white/20 rounded-2xl p-8 mb-12">' +
                    '<a href="' + deepLink + '" class="inline-block bg-white text-neutral-950 font-semibold px-8 py-4 rounded-full hover:bg-neutral-200 transition-colors mb-3">Open in NewsLight</a>' +
                  '</div>' +
                  '<div>' +
                    '<h2 class="font-serif text-2xl font-bold mb-3">Coming Soon</h2>' +
                    '<p class="text-white/80 mb-6">Get local news, powered by AI.</p>' +
                    '<span class="inline-block bg-black/25 border border-white/25 text-white font-semibold text-sm px-8 py-4 rounded-full">Coming to the App Store</span>' +
                  '</div>' +
                '</div>';
            });
        }

        function escapeHtml(str) {
          var div = document.createElement('div');
          div.appendChild(document.createTextNode(str));
          return div.innerHTML;
        }

        function setMeta(property, content) {
          var el = document.querySelector('meta[property="' + property + '"]');
          if (el) {
            el.setAttribute('content', content);
          } else {
            el = document.createElement('meta');
            el.setAttribute('property', property);
            el.setAttribute('content', content);
            document.head.appendChild(el);
          }
        }
      })();
    </script>
  </body>
</html>
